services:
  - type: web
    name: proalbom-license-api
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn api:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: API_SECRET
        sync: false
      - key: GOOGLE_CREDENTIALS_JSON
        sync: false
      - key: SPREADSHEET_NAME
        value: VignetteCloud_Licenses
      - key: PYTHON_VERSION
        value: "3.12.3"
